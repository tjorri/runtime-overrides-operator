# SPDX-License-Identifier: Apache-2.0
name: Lint

# `push` is scoped to main so feature-branch pushes don't double-run
# alongside the pull_request event triggered by the same branch.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Actions are pinned by commit SHA per supply-chain hardening guidance.
# Comments record the human-readable tag so Dependabot / Renovate can
# upgrade the SHA and the comment together (Dependabot's
# `# tag` convention; Renovate's pinDigests behavior matches).
jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

      - name: Verify .ko.yaml carries the required OCI labels
        run: make check-image-consistency

      - name: Install helm-docs
        run: |
          set -euo pipefail
          version=v1.14.2
          curl -sSfL "https://github.com/norwoodj/helm-docs/releases/download/${version}/helm-docs_${version#v}_Linux_x86_64.tar.gz" \
            | tar -xz -C /tmp helm-docs
          sudo mv /tmp/helm-docs /usr/local/bin/helm-docs
          helm-docs --version

      - name: Verify Helm chart README is up-to-date
        run: make chart-docs-check
