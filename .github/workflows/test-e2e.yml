# SPDX-License-Identifier: Apache-2.0
name: E2E Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "NOTICE"
      - "LICENSE"
      - "renovate.json"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "NOTICE"
      - "LICENSE"
      - "renovate.json"

permissions:
  contents: read

# Actions pinned by commit SHA; see .github/workflows/lint.yml for the
# rationale and the Dependabot/Renovate convention.
jobs:
  test-e2e:
    name: KinD end-to-end
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          # setup-go enables module + build cache by default, keyed on
          # go.sum. ko's compilation reuses the same caches, so a PR that
          # doesn't touch go.sum hits a warm Go build cache and `ko build`
          # in BeforeSuite drops from ~90s to ~20-30s.

      - name: Install kind
        env:
          # Pinned via Renovate's custom regex manager (see renovate.json).
          KIND_VERSION: v0.31.0
        run: |
          set -euo pipefail
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Setup ko
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9
        with:
          # Keep aligned with KO_VERSION in the Makefile.
          version: v0.18.1

      - name: Install helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.16.4

      - name: Run e2e
        env:
          # Reuse the pre-installed ko from setup-ko rather than having the
          # Makefile download a per-version copy into bin/ on every run.
          KO: ko
        run: |
          go mod tidy
          make test-e2e

      # Cluster diagnostics (pod logs, events, pod listing) are dumped by
      # the e2e suite's AfterSuite to ./artifacts/ BEFORE the cluster
      # teardown. Doing it inline keeps the artifacts populated even when
      # the suite fails — the previous post-job kubectl-logs step ran
      # after the pods had already been deleted and produced empty files.
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts-${{ github.run_id }}
          path: artifacts/
          retention-days: 7
