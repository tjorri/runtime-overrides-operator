# SPDX-License-Identifier: Apache-2.0
#
# CodeQL static analysis for the Go operator code. Surfaces results on the
# repository's Security tab alongside Dependabot alerts. Complementary to
# golangci-lint's `gosec` rule (which we already run in .github/workflows/
# lint.yml): CodeQL adds interprocedural data-flow and taint analysis that
# rule-based linters can't reach.
#
# Triggers:
#   - pull_request against main, so issues surface before merge
#   - push to main, so the Security-tab signal stays current on the branch
#     that's actually shipped
#   - weekly cron, so new CodeQL queries / database updates land on the
#     repo even when no code changes
name: CodeQL

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "NOTICE"
      - "LICENSE"
      - "renovate.json"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "NOTICE"
      - "LICENSE"
      - "renovate.json"
  schedule:
    # Weekly, Monday 02:00 UTC — aligned with the Renovate cadence so the
    # security signal refreshes shortly before the dependency-bump PRs
    # land for review.
    - cron: "0 2 * * 1"

permissions:
  contents: read

# Actions pinned by commit SHA; see .github/workflows/lint.yml for the
# rationale and the Dependabot/Renovate convention.
jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF results to the Security tab
      actions: read            # required for the action to read workflow runs

    strategy:
      fail-fast: false
      matrix:
        language: [go]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` includes the standard security queries
          # plus the quality / maintainability suite. Quality findings
          # are higher-volume but useful for an early-stage project where
          # patterns get baked in.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          category: "/language:${{ matrix.language }}"
