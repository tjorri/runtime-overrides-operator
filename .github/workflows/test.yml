# SPDX-License-Identifier: Apache-2.0
name: Tests

# `push` is scoped to main so feature-branch pushes don't double-run
# alongside the pull_request event triggered by the same branch.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Actions pinned by commit SHA; see .github/workflows/lint.yml for the
# rationale and the Dependabot/Renovate convention.
jobs:
  test:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Running Tests
        run: |
          go mod tidy
          make test
