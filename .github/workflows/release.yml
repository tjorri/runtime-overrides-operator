# SPDX-License-Identifier: Apache-2.0
#
# Release pipeline driven by release-please + Conventional Commits.
#
# How a release happens:
#   1. Every push to main runs the `release-please` job, which maintains
#      an open "release PR" accumulating the next version's CHANGELOG.md
#      and the bumped Chart.yaml. The PR title is `chore: release X.Y.Z`.
#   2. When that PR is merged, release-please tags `vX.Y.Z`, publishes a
#      GitHub Release, and reports `releases_created: true` to the
#      `publish` job in the same workflow run.
#   3. The `publish` job builds + signs the multi-arch image with ko +
#      cosign, packages + pushes the Helm chart to GHCR OCI, uploads the
#      chart tarball as a release asset, and appends an install/verify
#      footer to the release body (release-please's generated changelog
#      stays as the lead content).
#
# Combining release-please + publish into ONE workflow file lets the
# publish step trigger off release-please's outputs in the same run,
# sidestepping GitHub's "workflows triggered by GITHUB_TOKEN don't run
# downstream workflows" restriction. No PAT needed.
#
# Recovering from a failed publish: workflow_dispatch this workflow with
# `force_publish_version: vX.Y.Z` set. The publish job re-runs against an
# already-tagged release, re-uploading the chart asset (with --clobber)
# and re-stamping the release-notes footer (idempotent via sentinel).

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish_version:
        description: |
          Re-run the publish job for an existing release (format: vX.Y.Z).
          Leave blank for a normal release-please-driven run.
        required: false
        type: string
        default: ""

# Minimum default for jobs that don't override below. Each job declares
# the exact extra scopes it needs — the publish job, for instance, never
# touches pull requests, and release-please never pushes to GHCR.
permissions:
  contents: read

env:
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/runtime-overrides-operator
  CHART_REPO: ghcr.io/${{ github.repository_owner }}/charts

# Actions pinned by commit SHA; see .github/workflows/lint.yml for the
# rationale and the Dependabot/Renovate convention.
jobs:
  release-please:
    name: release-please (maintain release PR)
    runs-on: ubuntu-latest
    # Skip release-please entirely when force_publish is set — we're
    # re-running an existing release, not creating a new one.
    if: ${{ inputs.force_publish_version == '' }}
    permissions:
      contents: write       # commit CHANGELOG.md + tag the release
      pull-requests: write  # open/update the release PR
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name:         ${{ steps.release.outputs.tag_name }}
      version:          ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # Fine-grained PAT (Contents: r/w, Pull requests: r/w), not
          # GITHUB_TOKEN — events triggered by GITHUB_TOKEN do not start
          # downstream workflow runs, which would leave the release PR
          # without lint/test/e2e signal. The PAT attributes the PR to
          # its owner so the pull_request event fires CI normally.
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build, sign, publish artifacts
    runs-on: ubuntu-latest
    needs: release-please
    # `always()` makes this job evaluate even when release-please was
    # skipped via the force_publish path. The publish then runs if EITHER:
    #  - release-please just cut a new release, OR
    #  - the dispatcher supplied a force_publish_version.
    if: |
      always() && (
        needs.release-please.outputs.releases_created == 'true' ||
        inputs.force_publish_version != ''
      )
    permissions:
      contents: write       # gh release upload + edit
      packages: write       # push image + chart to GHCR
      id-token: write       # cosign keyless signing via OIDC
      attestations: write   # actions/attest-build-provenance
    steps:
      - name: Resolve version
        id: version
        env:
          FORCE_VERSION:      ${{ inputs.force_publish_version }}
          RELEASE_PLEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          version="${FORCE_VERSION}"
          if [ -z "$version" ]; then
            version="${RELEASE_PLEASE_TAG}"
          fi
          if [ -z "$version" ]; then
            echo "::error::no version resolved (no force_publish_version input and release-please reported nothing)"
            exit 1
          fi
          # Defensive validation: a typo in workflow_dispatch input could
          # otherwise propagate into image tags and chart filenames.
          if ! printf '%s\n' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::version ${version} does not match vMAJOR.MINOR.PATCH[-prerelease]"
            exit 1
          fi
          chart_version="${version#v}"
          echo "version=${version}"           >> "$GITHUB_OUTPUT"
          echo "chart_version=${chart_version}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${version} (chart ${chart_version})"

      - name: Checkout the tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.version.outputs.version }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Setup ko
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9
        with:
          # Keep aligned with KO_VERSION in the Makefile so local builds
          # and CI builds use the same ko.
          version: v0.18.1

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.2.1

      - name: Setup cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push multi-arch image with ko
        id: ko-build
        env:
          KO_DOCKER_REPO: ${{ env.IMAGE_REPO }}
          VERSION:        ${{ steps.version.outputs.version }}
          CHART_VERSION:  ${{ steps.version.outputs.chart_version }}
        run: |
          set -euo pipefail
          # Reproducibility: pin embedded build timestamps to the tagged
          # commit's author date so re-running publish for the same tag
          # (the force_publish recovery path) produces the same digest.
          SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct "${VERSION}")
          export SOURCE_DATE_EPOCH
          echo "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}"
          # Three image refs:
          #   * `${VERSION}` (e.g. v0.2.2) — matches the git tag convention.
          #   * `${CHART_VERSION}` (e.g. 0.2.2) — bare semver, matches what
          #     the chart's _helpers.tpl pulls (`default .Chart.AppVersion`)
          #     since Helm's appVersion convention is no `v` prefix. Without
          #     this tag, `helm install` resolves the chart's image as
          #     `:0.2.2` and ImagePullBackOff's because only `:v0.2.2` is
          #     published — that was the bug present in v0.1.0 through
          #     v0.2.1.
          #   * `latest` — moving tag for users who want it.
          # All three point at the same digest; cosign signs the digest, so
          # the additional tags don't require additional signing.
          # ko --bare emits the resolved digest reference to stdout for cosign.
          image=$(ko build --bare \
            --tags "${VERSION}" \
            --tags "${CHART_VERSION}" \
            --tags "latest" \
            --platform=linux/amd64,linux/arm64 \
            ./cmd)
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          # ko's image ref is repo@sha256:...; split for the attestation step.
          digest=${image##*@}
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Built ${image}"

      - name: Sign image with cosign (keyless via OIDC)
        env:
          IMAGE: ${{ steps.ko-build.outputs.image }}
        run: cosign sign --yes "${IMAGE}"

      - name: Attest image build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_REPO }}
          subject-digest: ${{ steps.ko-build.outputs.digest }}
          push-to-registry: true

      - name: Generate image SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.ko-build.outputs.image }}
          format: spdx-json
          output-file: sbom-image.spdx.json
          # We attest the SBOM via actions/attest-sbom below; no need to
          # also upload it as a workflow artifact.
          upload-artifact: false

      - name: Attest image SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_REPO }}
          subject-digest: ${{ steps.ko-build.outputs.digest }}
          sbom-path: sbom-image.spdx.json
          push-to-registry: true

      - name: Sync CRDs and package both charts
        env:
          CHART_VERSION: ${{ steps.version.outputs.chart_version }}
        run: |
          set -euo pipefail
          # chart-sync regenerates CRDs into both charts (main + CRD-only)
          # AND writes the aggregated dist/crds.yaml asset.
          make chart-sync
          helm package deploy/charts/runtime-overrides-operator \
            --version "${CHART_VERSION}" \
            --app-version "${CHART_VERSION}" \
            --destination dist/
          helm package deploy/charts/runtime-overrides-operator-crds \
            --version "${CHART_VERSION}" \
            --app-version "${CHART_VERSION}" \
            --destination dist/
          ls -la dist/

      - name: Push operator chart to GHCR OCI
        id: chart-push
        env:
          CHART_VERSION: ${{ steps.version.outputs.chart_version }}
        run: |
          set -euo pipefail
          # helm push prints "Digest: sha256:..." to stdout on success. Capture
          # it so the next step can cosign-sign the exact pushed manifest.
          push_out=$(helm push "dist/runtime-overrides-operator-${CHART_VERSION}.tgz" \
            "oci://${CHART_REPO}" 2>&1)
          echo "${push_out}"
          digest=$(echo "${push_out}" | awk '/^Digest:/ {print $2}')
          if [ -z "${digest}" ]; then
            echo "helm push did not emit a Digest line; cannot sign chart" >&2
            exit 1
          fi
          echo "chart_digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "chart_ref=${CHART_REPO}/runtime-overrides-operator@${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign operator chart with cosign (keyless via OIDC)
        env:
          CHART_REF: ${{ steps.chart-push.outputs.chart_ref }}
        run: cosign sign --yes "${CHART_REF}"

      - name: Attest operator chart build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.CHART_REPO }}/runtime-overrides-operator
          subject-digest: ${{ steps.chart-push.outputs.chart_digest }}
          push-to-registry: true

      - name: Push CRD-only chart to GHCR OCI
        id: crds-chart-push
        env:
          CHART_VERSION: ${{ steps.version.outputs.chart_version }}
        run: |
          set -euo pipefail
          push_out=$(helm push "dist/runtime-overrides-operator-crds-${CHART_VERSION}.tgz" \
            "oci://${CHART_REPO}" 2>&1)
          echo "${push_out}"
          digest=$(echo "${push_out}" | awk '/^Digest:/ {print $2}')
          if [ -z "${digest}" ]; then
            echo "helm push did not emit a Digest line; cannot sign CRD chart" >&2
            exit 1
          fi
          echo "chart_digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "chart_ref=${CHART_REPO}/runtime-overrides-operator-crds@${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign CRD chart with cosign (keyless via OIDC)
        env:
          CHART_REF: ${{ steps.crds-chart-push.outputs.chart_ref }}
        run: cosign sign --yes "${CHART_REF}"

      - name: Attest CRD chart build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.CHART_REPO }}/runtime-overrides-operator-crds
          subject-digest: ${{ steps.crds-chart-push.outputs.chart_digest }}
          push-to-registry: true

      - name: Attach chart tarballs and aggregated crds.yaml to GitHub release
        env:
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          VERSION:       ${{ steps.version.outputs.version }}
          CHART_VERSION: ${{ steps.version.outputs.chart_version }}
        run: |
          set -euo pipefail
          gh release upload "${VERSION}" \
            "dist/runtime-overrides-operator-${CHART_VERSION}.tgz" \
            "dist/runtime-overrides-operator-crds-${CHART_VERSION}.tgz" \
            "dist/crds.yaml" \
            --clobber

      - name: Append install + verify footer to release notes
        env:
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          VERSION:         ${{ steps.version.outputs.version }}
          CHART_VERSION:   ${{ steps.version.outputs.chart_version }}
          IMAGE:           ${{ steps.ko-build.outputs.image }}
          CHART_REF:       ${{ steps.chart-push.outputs.chart_ref }}
          CRDS_CHART_REF:  ${{ steps.crds-chart-push.outputs.chart_ref }}
        run: |
          set -euo pipefail
          # release-please owns the changelog body. We append a static
          # footer (install snippet, signature-verify command, license
          # summary). A sentinel comment makes the append idempotent —
          # a re-run strips the prior footer and re-stamps a fresh one.
          sentinel='<!-- runtime-overrides-operator install footer -->'

          # release-please's release-creation is eventually consistent —
          # the API may 404 for a few seconds after releases_created=true.
          # Retry briefly so a transient miss doesn't strand a published
          # chart with no footer (the chart is already pushed at this point).
          existing=""
          for attempt in 1 2 3 4 5; do
            if existing=$(gh release view "${VERSION}" --json body --jq .body 2>/dev/null); then
              break
            fi
            echo "release ${VERSION} not yet visible (attempt ${attempt}/5); sleeping 5s"
            sleep 5
          done
          if [ -z "${existing+x}" ]; then
            echo "release ${VERSION} never became visible after 25s — aborting footer append" >&2
            exit 1
          fi
          # Strip any existing footer (everything from the sentinel onward).
          head_body=${existing%%${sentinel}*}

          footer=$(cat <<EOF
          ${sentinel}

          ---

          ## Install

          Three patterns, pick the one that matches how you manage CRD lifecycle:

          **A. One-command (CRDs bundled with the operator chart).**
          Simplest for first install. Note that subsequent \`helm upgrade\`
          will NOT update the CRDs themselves — Helm's bundled-CRDs path
          doesn't reconcile schema changes. Fine for proofs of concept;
          consider pattern B or C for production.

          \`\`\`sh
          helm install ro-op oci://${CHART_REPO}/runtime-overrides-operator \\
            --version ${CHART_VERSION} \\
            --namespace runtime-overrides-system --create-namespace
          \`\`\`

          **B. Separate CRD chart (recommended for production).**
          \`helm upgrade\` on each chart applies its respective resources,
          including schema changes to the CRDs. The two charts version in
          lockstep.

          \`\`\`sh
          helm install ro-op-crds oci://${CHART_REPO}/runtime-overrides-operator-crds \\
            --version ${CHART_VERSION}
          helm install ro-op oci://${CHART_REPO}/runtime-overrides-operator \\
            --version ${CHART_VERSION} \\
            --namespace runtime-overrides-system --create-namespace \\
            --set crds.install=false
          \`\`\`

          **C. Raw CRD manifest (no Helm management of CRDs at all).**
          Apply the per-release aggregated CRD YAML directly. Use this if
          your platform pins CRD ownership outside of Helm (e.g. Argo CD,
          Crossplane composition).

          \`\`\`sh
          kubectl apply -f https://github.com/${{ github.repository }}/releases/download/${VERSION}/crds.yaml
          helm install ro-op oci://${CHART_REPO}/runtime-overrides-operator \\
            --version ${CHART_VERSION} \\
            --namespace runtime-overrides-system --create-namespace \\
            --set crds.install=false
          \`\`\`

          ## Verify the signatures

          The image and both Helm charts are cosign-signed (keyless, via
          GitHub OIDC). Verify each before installing:

          \`\`\`sh
          cosign verify ${IMAGE} \\
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

          cosign verify ${CHART_REF} \\
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

          cosign verify ${CRDS_CHART_REF} \\
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          \`\`\`

          ## Verify the build provenance

          All three OCI artifacts carry a SLSA build-provenance attestation
          produced by \`actions/attest-build-provenance\`. Verify with the
          GitHub CLI:

          \`\`\`sh
          gh attestation verify oci://${IMAGE} --repo ${{ github.repository }}
          gh attestation verify oci://${CHART_REF} --repo ${{ github.repository }}
          gh attestation verify oci://${CRDS_CHART_REF} --repo ${{ github.repository }}
          \`\`\`

          ## Software Bill of Materials (SBOM)

          The container image ships with an SPDX-format SBOM, generated by
          \`anchore/sbom-action\` and Sigstore-attested via
          \`actions/attest-sbom\`. Inspect the attached attestations and
          download the SBOM with:

          \`\`\`sh
          cosign tree ${IMAGE}                                            # list attached referrers
          gh attestation verify oci://${IMAGE} --repo ${{ github.repository }} --predicate-type https://spdx.dev/Document
          cosign download attestation ${IMAGE} \\
            --predicate-type https://spdx.dev/Document \\
            | jq -r '.payload | @base64d | fromjson | .predicate' > sbom.spdx.json
          \`\`\`

          The Helm chart is YAML-only with no embedded code; an SBOM of
          the chart would be redundant with the image's SBOM and the
          chart's own pull-spec reference, so we don't ship one.

          ## Licensing

          - Operator binary + container image: **AGPL-3.0-only**
          - Helm chart: **Apache-2.0**

          See [NOTICE](https://github.com/${{ github.repository }}/blob/${VERSION}/NOTICE) for the AGPL §13 source-availability statement.
          EOF
          )

          printf '%s\n%s\n' "$head_body" "$footer" \
            | gh release edit "${VERSION}" --notes-file -
