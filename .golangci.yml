version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    errcheck:
      # Standard set of "return value not worth checking" functions.
      # Without these, idiomatic Go (`defer resp.Body.Close()`,
      # `fmt.Fprintln(os.Stdout, ...)`) gets flagged and forces
      # noisy `_ =` wrappers that everyone has to learn to ignore.
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
      # Tests repeat short literal strings (CR names, override field
      # keys, namespaces) for clarity — extracting constants makes the
      # tests harder to read and obscures the value being asserted.
      - linters:
          - goconst
          - lll
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
