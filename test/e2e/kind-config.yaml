# SPDX-License-Identifier: Apache-2.0
#
# KinD cluster config for the e2e suite. The `containerdConfigPatches`
# block routes image pulls for `localhost:5001` (where the host-side OCI
# registry sidecar runs) to `kind-registry:5000` (the registry container
# name on the kind Docker network). This lets the operator image be
# `ko build`-pushed once to the local registry and pulled by the cluster
# without the slow `kind load docker-image` tar-stream — typical savings
# are ~30s per BeforeSuite.
#
# See https://kind.sigs.k8s.io/docs/user/local-registry/ for the
# canonical recipe this is based on.
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
      endpoint = ["http://kind-registry:5000"]
