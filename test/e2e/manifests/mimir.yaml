# SPDX-License-Identifier: Apache-2.0
# Minimal Mimir single-binary for e2e. Same CSV-mount pattern as Loki:
# both the installer's base file and the operator's output CM are mounted
# as directories, with the operator's file listed RIGHTMOST in the
# runtime_config.file CSV.
apiVersion: v1
kind: Namespace
metadata:
  name: mimir
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-base
  namespace: mimir
data:
  mimir.yaml: |
    multitenancy_enabled: false
    target: all
    server:
      http_listen_port: 8080
    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /tmp/mimir
    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /tmp/mimir/blocks
      tsdb:
        dir: /tmp/mimir/tsdb
    ingester:
      ring:
        replication_factor: 1
        kvstore:
          store: inmemory
    distributor:
      ring:
        kvstore:
          store: inmemory
    ruler:
      ring:
        kvstore:
          store: inmemory
    compactor:
      data_dir: /tmp/mimir/compactor
      sharding_ring:
        kvstore:
          store: inmemory
    runtime_config:
      file: /etc/mimir/runtime-base/base.yaml,/etc/mimir/runtime-tenants/runtime-tenants.yaml
      # E2E-ONLY: dskit's default poll period is 10s, which adds up to
      # 10s of dead time per propagation-bound test. Tightening to 1s
      # compresses the worst-case operator → CM → kubelet → dskit chain
      # closer to the kubelet sync floor (~2-5s). Do NOT replicate this
      # in production — frequent re-reads of the file have meaningful
      # I/O cost at scale.
      period: 1s
  base.yaml: |
    overrides: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-runtime-tenants
  namespace: mimir
  labels:
    e2e.runtimeoverrides.io/preseed: "true"
data:
  runtime-tenants.yaml: "overrides: {}\n"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: mimir
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      containers:
        - name: mimir
          image: grafana/mimir:3.0.6
          args:
            - -config.file=/etc/mimir/config/mimir.yaml
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/mimir/config
            - name: runtime-base
              mountPath: /etc/mimir/runtime-base
            - name: runtime-tenants
              mountPath: /etc/mimir/runtime-tenants
            - name: data
              mountPath: /tmp/mimir
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: mimir-base
            items:
              - key: mimir.yaml
                path: mimir.yaml
        - name: runtime-base
          configMap:
            name: mimir-base
            items:
              - key: base.yaml
                path: base.yaml
        - name: runtime-tenants
          configMap:
            name: mimir-runtime-tenants
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: mimir
spec:
  selector:
    app: mimir
  ports:
    - port: 8080
      targetPort: 8080
      name: http
