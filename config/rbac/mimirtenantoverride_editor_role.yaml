# This rule is not used by the project runtime-overrides-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the runtimeoverrides.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: runtime-overrides-operator
    app.kubernetes.io/managed-by: kustomize
  name: mimirtenantoverride-editor-role
rules:
- apiGroups:
  - runtimeoverrides.io
  resources:
  - mimirtenantoverrides
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - runtimeoverrides.io
  resources:
  - mimirtenantoverrides/status
  verbs:
  - get
