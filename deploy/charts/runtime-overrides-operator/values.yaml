# Default values for runtime-overrides-operator.
#
# Comments use helm-docs conventions:
#   # -- description    Renders as the row description in README.md
#   # @section Title    Begins a named section in the values table
#   # @default -- text  Overrides the inferred default
#
# Regenerate README.md after editing this file with `make chart-docs`.

# @section CRDs
# -- CRD installation behavior. By default the main chart installs the
# `LokiTenantOverride` and `MimirTenantOverride` CRDs as Helm release
# resources. Set `crds.install: false` if you install the CRDs separately
# via the dedicated `runtime-overrides-operator-crds` chart (recommended
# for production: gives you explicit upgrade lifecycle via `helm upgrade`)
# or via raw `kubectl apply -f` from the per-release `crds.yaml` asset.
crds:
  # -- Render and install the CRDs as part of this chart's release.
  # Disable when installing the CRDs out-of-band.
  install: true

# @section Image
# -- The operator's container image.
image:
  # -- Container image repository for the operator binary.
  repository: ghcr.io/tjorri/runtime-overrides-operator
  # -- Image tag. Default is the chart's appVersion; override to use a
  # specific operator release independent of the chart version.
  # @default -- `.Chart.AppVersion`
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Image pull secrets if the image is in a private registry.
  pullSecrets: []

# @section Operator
# -- Per-target configuration. One Loki + one Mimir per operator deployment.
# Multi-target setups: install the chart twice with different release names
# and outputConfigMap names.
operator:
  targets:
    loki:
      # -- Enable the Loki reconciler. When false, the chart still installs
      # the LokiTenantOverride CRD; the disabled-target reconciler then
      # surfaces `Applied=False, reason=TargetDisabled` on any CR.
      enabled: true
      # -- The ConfigMap the operator owns and writes per-tenant overrides
      # to. The Loki installer must mount this CM as a directory and add
      # the `runtime-tenants.yaml` file as the RIGHTMOST entry in its
      # runtime_config.file CSV. Operator's value wins on
      # conflict against the installer's base file.
      outputConfigMap:
        # -- Namespace of the Loki output ConfigMap.
        namespace: monitoring
        # -- Name of the Loki output ConfigMap.
        name: loki-runtime-tenants
    mimir:
      # -- Enable the Mimir reconciler. Same disabled-target semantics
      # as Loki.
      enabled: false
      # -- The ConfigMap the operator owns for Mimir overrides; see the
      # Loki outputConfigMap docs for wire-up requirements.
      outputConfigMap:
        # -- Namespace of the Mimir output ConfigMap.
        namespace: monitoring
        # -- Name of the Mimir output ConfigMap.
        name: mimir-runtime-tenants

  webhook:
    # -- Enable the validating admission webhook. failurePolicy is Ignore
    # (ADR 0001) — Layer-3 controller-side validation is the load-bearing
    # safety net. Disabling here means users don't get apply-time error
    # messages on bad CRs, but validation still gates the merged output.
    enabled: true

# @section Tenant ownership policy
# -- Bundled ValidatingAdmissionPolicy that gates which namespaces can set
# which `spec.tenantId`. K8s 1.30+ baseline.
tenantOwnership:
  # -- Render the bundled ValidatingAdmissionPolicy. Set false to bring
  # your own admission policy (OPA/Gatekeeper, Kyverno, another VAP, …).
  enabled: true
  # -- Policy mode. Allowed values: namespace-equals-tenant | template |
  # custom | off. See README for the CEL each generates.
  mode: namespace-equals-tenant
  # -- Used only when `mode: template`. The `{namespace}` substring is
  # replaced with the request's namespace at admission time. Single quotes
  # are rejected by values.schema.json — they break the generated CEL.
  namespacePattern: "{namespace}"
  # -- Used only when `mode: custom`. Raw CEL expression evaluated against
  # the AdmissionRequest. The chart does NOT escape this — you are
  # responsible for valid CEL.
  customExpression: ""
  # -- Namespaces allowed to set arbitrary `spec.tenantId`. The default
  # `namespace-equals-tenant` mode honors this list as an escape hatch
  # for central-overrides patterns (e.g. a `platform-overrides`
  # namespace contributing to many tenants).
  crossNamespaceNamespaces: []

# @section cert-manager
# -- cert-manager wiring for the webhook's TLS cert. Required when
# `operator.webhook.enabled: true`.
certManager:
  # -- Render the Certificate (and a self-signed Issuer if no
  # `issuerRef` is set).
  enabled: true
  # -- Use an existing cluster issuer instead of the chart's self-signed
  # Issuer. Set to `{name: my-issuer, kind: ClusterIssuer}` (or `Issuer`).
  # @default -- `{}` — uses the chart's self-signed Issuer
  issuerRef: {}

# @section Deployment
# -- Replica count. Two replicas recommended for webhook HA — the
# webhook server runs on both replicas independently of leader election;
# only one replica reconciles at a time.
replicas: 2

# -- Container resource requests and limits.
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# @section Observability
metrics:
  serviceMonitor:
    # -- Render a Prometheus ServiceMonitor for scraping the metrics
    # endpoint. Requires prometheus-operator in the cluster.
    enabled: false

prometheusRules:
  # -- Render bundled Prometheus alert rules. Off by default — the
  # canonical rule set ships in Phase 2.
  enabled: false

# @section Pod customization
# -- Labels applied to every resource the chart creates.
commonLabels: {}
# -- Annotations applied to the operator pod.
podAnnotations: {}
# -- Labels applied to the operator pod (in addition to the chart's selector labels).
podLabels: {}
# -- nodeSelector for the operator pod.
nodeSelector: {}
# -- Tolerations for the operator pod.
tolerations: []
# -- Affinity rules for the operator pod.
affinity: {}
